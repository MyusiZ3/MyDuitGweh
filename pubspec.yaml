name: my_duit_gweh
description: "My Duit Gweh - Smart Financial Manager"
publish_to: "none"

version: 1.0.3

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^3.12.1
  cloud_firestore: ^5.6.7
  firebase_auth: ^5.5.2
  google_sign_in: ^6.2.2
  shared_preferences: ^2.3.5
  google_fonts: ^6.2.1
  intl: ^0.18.1
  pdf: ^3.11.3
  printing: ^5.14.3
  path_provider: ^2.1.5
  lottie: ^3.3.1
  fl_chart: ^0.66.0
  local_auth: ^2.1.8
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  flutter_timezone: ^3.0.0
  csv: ^6.0.0
  flutter_contacts: ^1.1.9+2
  permission_handler: ^12.0.1
  shimmer: ^3.0.0
  connectivity_plus: ^7.1.0
  http: ^1.6.0
  google_generative_ai: ^0.4.7
  local_auth_android: ^1.0.51
  local_auth_ios: ^1.1.7
  flutter_markdown: ^0.7.3
  uuid: ^4.3.3
  google_mlkit_text_recognition: ^0.15.0
  image_picker: ^1.2.0
  camera: ^0.11.2
  camera_android: ^0.10.9
  dio: ^5.9.2
  open_file_plus: ^3.4.1+1
  package_info_plus: ^8.1.5
  safe_device: ^1.3.8
  sqflite: ^2.3.3
  path: ^1.9.0
  workmanager: ^0.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo_app.png"
  min_sdk_android: 23

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo_app.png
    - assets/images/logo_loading.png
    - assets/images/notif_logo.png
